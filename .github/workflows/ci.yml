name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, labeled, unlabeled]
  schedule:
    # Nightly E2E on dev branch at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies (high+)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: Audit all dependencies (critical gate)
        run: npm audit --audit-level=critical

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres-test:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: portainer_dashboard_test
          POSTGRES_USER: app_user
          POSTGRES_PASSWORD: changeme-postgres-app
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U app_user -d portainer_dashboard_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis-test:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: npm run build -w @dashboard/contracts && npm run build -w @dashboard/core && npm run build -w @dashboard/infrastructure && npm run build -w @dashboard/security && npm run build -w @dashboard/observability && npm run build -w @dashboard/operations && npm run build -w @dashboard/ai && npm run build -w @dashboard/foundation

      - name: Run backend tests
        run: npm run test -w backend -- --coverage
        env:
          POSTGRES_TEST_URL: postgresql://app_user:changeme-postgres-app@localhost:5433/portainer_dashboard_test
          REDIS_URL: redis://localhost:6379

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-backend
          path: backend/coverage/
          retention-days: 14

  test-packages:
    name: Package Tests
    runs-on: ubuntu-latest
    services:
      postgres-test:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: portainer_dashboard_test
          POSTGRES_USER: app_user
          POSTGRES_PASSWORD: changeme-postgres-app
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U app_user -d portainer_dashboard_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis-test:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        # Use npm run build (not tsc --build) so @dashboard/core also copies SQL migrations
        run: npm run build -w @dashboard/contracts && npm run build -w @dashboard/core && npm run build -w @dashboard/infrastructure && npm run build -w @dashboard/security && npm run build -w @dashboard/observability && npm run build -w @dashboard/operations && npm run build -w @dashboard/ai && npm run build -w @dashboard/foundation

      - name: Run workspace package tests (parallel)
        # `security`, `observability`, and `ai` all run integration tests
        # against the shared test Postgres and truncate shared tables
        # (`spans`, `insights`) in beforeEach. Running them concurrently
        # produces intermittent races where one workspace's TRUNCATE wipes
        # another workspace's seeded rows mid-test (observed on PR #1246 —
        # traces-red-route saw callCount=21 instead of 50, then
        # prometheus-route saw insights_total with no labelled rows).
        #
        # Chain the three with `&&` inside one concurrently slot so they run
        # sequentially relative to each other; non-DB workspaces stay parallel.
        # A more robust long-term fix is per-test transactions or per-workspace
        # test databases.
        run: >
          npx concurrently --kill-others-on-fail --names contracts,core,infra,db-shared,ops,foundation,server
          "npm run test -w @dashboard/contracts"
          "npm run test -w @dashboard/core"
          "npm run test -w @dashboard/infrastructure"
          "npm run test -w @dashboard/security && npm run test -w @dashboard/observability && npm run test -w @dashboard/ai"
          "npm run test -w @dashboard/operations"
          "npm run test -w @dashboard/foundation"
          "npm run test -w @dashboard/server"
        env:
          POSTGRES_TEST_URL: postgresql://app_user:changeme-postgres-app@localhost:5433/portainer_dashboard_test
          REDIS_URL: redis://localhost:6379

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test -w frontend -- --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-frontend
          path: frontend/coverage/
          retention-days: 14

  test-tools:
    name: Test MCP Tools (Python)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool: [grype-mcp, snyk-mcp, nvd-mcp]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: tools/${{ matrix.tool }}
        run: |
          [ -f requirements.txt ] && pip install -r requirements.txt
          pip install pytest pytest-asyncio mcp
      - name: Run tests
        working-directory: tools/${{ matrix.tool }}
        run: python -m pytest test_server.py -v

  test-gate:
    name: Test Gate (Required)
    runs-on: ubuntu-latest
    needs: [test-packages, test-backend, test-frontend, test-tools]
    steps:
      - name: All tests passed
        run: echo "All package, backend, and frontend tests passed. PR is eligible for merge."

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test-gate]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    # Gated: never run on Dependabot PRs. Otherwise only run on schedule,
    # manual dispatch, or when a PR carries the `e2e` label. PRs to main/dev
    # do NOT auto-run E2E — reviewers add the `e2e` label to opt in.
    if: >-
      github.actor != 'dependabot[bot]' && (
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'e2e')
      )
    needs: [build]
    # Test credentials only — never used outside the disposable CI runner.
    # JWT_SECRET is 48 chars to satisfy the production 32+ char guard in env.schema.ts.
    env:
      DASHBOARD_USERNAME: admin
      DASHBOARD_PASSWORD: changeme12345
      JWT_SECRET: test-secret-ci-e2e-do-not-use-in-prod-0123456789ab
      POSTGRES_APP_PASSWORD: changeme-postgres-app
      TIMESCALE_PASSWORD: changeme-timescale
      REDIS_PASSWORD: changeme-redis
      DASHBOARD_DOMAIN: localhost
      PORTAINER_API_URL: http://127.0.0.1:9999
      PORTAINER_API_KEY: e2e-dummy-key
      OLLAMA_BASE_URL: http://127.0.0.1:11434
      LOG_LEVEL: info
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'schedule' && 'dev' || '' }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Log in to DHI registry
        uses: docker/login-action@v4
        with:
          registry: dhi.io
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application images
        run: docker compose -f docker/docker-compose.yml build backend frontend

      - name: Start databases (phase 1)
        run: |
          docker compose -f docker/docker-compose.yml up -d postgres-app timescaledb

          echo "Waiting for postgres-app..."
          timeout 90 bash -c 'until docker compose -f docker/docker-compose.yml exec -T postgres-app pg_isready -U app_user -d portainer_dashboard > /dev/null 2>&1; do sleep 3; done'
          echo "Waiting for timescaledb..."
          timeout 120 bash -c 'until docker compose -f docker/docker-compose.yml exec -T timescaledb pg_isready -U metrics_user -d metrics > /dev/null 2>&1; do sleep 3; done'
          echo "Databases ready"

      - name: Start application (phase 2)
        run: |
          # Compose `depends_on: condition: service_healthy` blocks `up` until
          # redis + DBs are healthy and the backend healthcheck passes.
          docker compose -f docker/docker-compose.yml up -d redis backend frontend

          echo "Waiting for backend /health..."
          timeout 180 bash -c 'until curl -sf http://localhost:3051/health > /dev/null 2>&1; do sleep 3; done'
          echo "Waiting for frontend..."
          timeout 90 bash -c 'until curl -sf http://localhost:8080/ > /dev/null 2>&1; do sleep 3; done'
          echo "All services ready"

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          E2E_BASE_URL: http://localhost:8080
          E2E_USERNAME: admin
          E2E_PASSWORD: changeme12345

      - name: Dump service logs on failure
        if: failure()
        run: |
          mkdir -p e2e-logs
          {
            echo "=== docker compose ps ==="
            docker compose -f docker/docker-compose.yml ps
            for svc in backend frontend redis postgres-app timescaledb; do
              echo
              echo "=== ${svc} logs ==="
              docker compose -f docker/docker-compose.yml logs --tail 200 "${svc}" || true
            done
          } > e2e-logs/compose.log 2>&1

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload compose logs
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: e2e-compose-logs
          path: e2e-logs/
          retention-days: 7

      - name: Stop application
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v
