worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    # Temp paths for non-root
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # SSE log streaming uses ?ticket=… query parameters (#1112). The default
    # `$request` token includes the full query string, which would write the
    # single-use ticket into nginx access logs (and any SIEM that mirrors
    # them). This format reconstructs the request line from method + path
    # only, omitting `$args`, so credentials never reach disk.
    log_format stream_no_args '$remote_addr - $remote_user [$time_local] '
                              '"$request_method $uri $server_protocol" '
                              '$status $body_bytes_sent "$http_referer" '
                              '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /dev/stdout main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Map to restrict WebSocket Upgrade header values — mitigates H2C smuggling
    # by only allowing the literal value "websocket" through the proxy.
    map $http_upgrade $connection_upgrade {
        websocket upgrade;
        default   close;
    }

    server {
        listen 8080 default_server;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers are defined in an external snippet and included per
        # location block. They are NOT set at the server level because nginx
        # silently drops all server-level add_header directives whenever a
        # location block defines its own add_header (CWE-16).

        # SSE container log stream (#1112). Matched ahead of the generic
        # /api/ block via regex so we can apply a dedicated access_log that
        # omits $args — the URL carries a short-lived ?ticket=… that must
        # NOT be written to disk. Buffering is also disabled so log lines
        # reach the client in real time.
        #
        # SSE is plain HTTP/1.1 streaming, so we deliberately do NOT forward
        # any Upgrade header (would risk H2C smuggling per CWE-444). nginx
        # treats Upgrade as hop-by-hop by default and drops it; we just have
        # to avoid setting proxy_http_version 1.1 + proxy_set_header Upgrade
        # like the /socket.io/ block does.
        location ~ ^/api/containers/.+/logs/stream {
            include /etc/nginx/security-headers.conf;
            access_log /dev/stdout stream_no_args;
            proxy_pass http://backend:3051;
            proxy_set_header Host backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400;
        }

        # API proxy
        location /api/ {
            include /etc/nginx/security-headers.conf;
            proxy_pass http://backend:3051;
            proxy_set_header Host backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Bare /health is the SPA Health & Monitoring route. Exact-match wins
        # over the /health/ backend proxy and the SPA catch-all, so a direct
        # navigation or refresh serves index.html instead of 301'ing into the
        # backend (which 404s). (#1420)
        location = /health {
            include /etc/nginx/security-headers.conf;
            include /etc/nginx/cache-nocache.conf;
            try_files /index.html =404;
        }

        # Backend liveness sub-paths (e.g. /health/live, /health/ready) still
        # proxy to the backend. External callers that want bare-path liveness
        # should hit the backend directly at port 3051.
        location /health/ {
            include /etc/nginx/security-headers.conf;
            proxy_pass http://backend:3051;
            proxy_set_header Host backend;
        }

        # Docs proxy
        location /docs {
            include /etc/nginx/security-headers.conf;
            proxy_pass http://backend:3051;
            proxy_set_header Host backend;
        }

        # Socket.IO proxy — Upgrade restricted to "websocket" via the
        # `map $http_upgrade $connection_upgrade` block above (lines 50-53),
        # which routes everything except literal "websocket" to "close".
        # That denies H2C smuggling (CWE-444) at the Connection header
        # gate — the upstream only honors the upgrade when Connection
        # carries the mapped value. Semgrep's generic rule cannot see the
        # mitigation across the map and flags this block; suppress.
        # nosemgrep: generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
        location /socket.io/ {
            include /etc/nginx/security-headers.conf;
            proxy_pass http://backend:3051;
            # nosemgrep: generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # index.html must never be cached — it contains the chunk filenames for the
        # current build. After a deployment, browsers must fetch fresh index.html
        # so lazy-loaded chunks resolve to the new hashed URLs.
        location = /index.html {
            include /etc/nginx/security-headers.conf;
            include /etc/nginx/cache-nocache.conf;
        }

        # Static assets with caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            include /etc/nginx/security-headers.conf;
            include /etc/nginx/cache-immutable.conf;
        }

        # SPA fallback
        location / {
            include /etc/nginx/security-headers.conf;
            try_files $uri $uri/ /index.html;
        }
    }
}
